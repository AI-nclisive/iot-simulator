name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: write # push HTML reports to the gh-pages branch (report storage)
  checks: write # dorny/test-reporter creates a clickable "Tests" check run
  pages: write # deploy the reports site via actions/deploy-pages
  id-token: write # OIDC token required by actions/deploy-pages

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest # has Docker preinstalled, so Testcontainers ITs run (not skipped)
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace

      # Renders JUnit results as a clickable "Tests" check (PR → Checks tab),
      # no download needed.
      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      # Full Gradle HTML report (and JaCoCo) as a downloadable backup.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/test/**'
          if-no-files-found: ignore

      # Publish the full Gradle + JaCoCo HTML reports (with navigation) to GitHub
      # Pages so they open by link, no download. Non-fatal — never blocks the build.
      - name: Assemble HTML reports
        if: always()
        continue-on-error: true
        run: |
          mkdir -p public
          while IFS= read -r dir; do
            rel="${dir#./}"
            module="${rel%%/build/reports/*}"
            slug="${module//\//-}"
            case "$rel" in
              */reports/tests/test) kind=tests ;;
              */reports/jacoco/test/html) kind=jacoco ;;
              *) kind=other ;;
            esac
            mkdir -p "public/$slug/$kind"
            cp -r "$dir/." "public/$slug/$kind/"
          done < <(find . -type d \( -path '*/build/reports/tests/test' -o -path '*/build/reports/jacoco/test/html' \))
          {
            echo "<!doctype html><meta charset=utf-8><title>iot-simulator reports</title>"
            echo "<h1>iot-simulator — build reports</h1><ul>"
            for idx in $(cd public && ls */*/index.html 2>/dev/null | sort); do
              echo "<li><a href=\"$idx\">$idx</a></li>"
            done
            echo "</ul>"
          } > public/index.html

      # Persist this build's reports on the gh-pages branch. It is the durable
      # store (keep_files preserves master/ + other PRs' pr-*/ dirs); the action
      # retries on push races from concurrent runs.
      - name: Stage reports on gh-pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || 'master' }}
          keep_files: true

      # Snapshot the whole gh-pages store and hand it to deploy-pages. This serves
      # the site via the GitHub Actions Pages pipeline (fast, atomic) instead of
      # the slow legacy per-file branch build.
      - name: Checkout gh-pages store
        if: always()
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: pages-site
      - name: Strip VCS metadata from the artifact
        if: always()
        continue-on-error: true
        run: rm -rf pages-site/.git
      - name: Configure Pages
        if: always()
        continue-on-error: true
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Report link
        if: always()
        continue-on-error: true
        run: |
          sub="${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || 'master' }}"
          echo "📊 HTML reports: https://ai-nclisive.github.io/iot-simulator/$sub/" >> "$GITHUB_STEP_SUMMARY"

  # Serve the snapshot uploaded above. Isolated to the github-pages environment
  # with a dedicated concurrency group so deployments never overlap.
  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
