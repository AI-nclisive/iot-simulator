name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  checks: write # dorny/test-reporter creates a clickable "Tests" check run

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest # has Docker preinstalled, so Testcontainers ITs run (not skipped)
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace

      # Renders JUnit results as a clickable "Tests" check (PR → Checks tab),
      # no download needed.
      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      # Full Gradle + JaCoCo HTML reports as a downloadable artifact.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/**'
          if-no-files-found: ignore
