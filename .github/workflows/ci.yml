name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  checks: write # dorny/test-reporter creates a clickable "Tests" check run

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog-sync:
    # Enforces AGENTS.md "Done is recorded in two places": a PR that implements a
    # task (Implements: IS-/UI-XXX) must also flip that task's catalog checkbox in
    # the same PR, so a merged task never leaves a stale "[ ]" behind.
    # PR-only — there is no PR body to inspect on a direct push to master.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need the merge-base to diff against the PR base

      - name: Check catalog checkbox is updated for the linked task
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/catalog-sync-check.sh

  build:
    runs-on: ubuntu-latest # has Docker preinstalled, so Testcontainers ITs run (not skipped)
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Frontend typecheck & build
        run: |
          npm ci
          npm run typecheck
          npm run build

      # Renders JUnit results as a clickable "Tests" check (PR → Checks tab),
      # no download needed.
      - name: Publish test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      # Full Gradle + JaCoCo HTML reports as a downloadable artifact.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/**'
          if-no-files-found: ignore
