name: Claude PR Review

# IS-112 [SDLC] — automated, advisory AI code review on every PR.
# Requires (see .github/OWNER_SETUP.md): (1) the Claude GitHub App installed on the
# repo — https://github.com/apps/claude (org-owner approval), and (2) the
# CLAUDE_CODE_OAUTH_TOKEN secret. Both are needed; the token alone fails with
# "Claude Code is not installed on this repository".
# Uses the `pull_request` trigger (NOT `pull_request_target`): GitHub withholds
# repo secrets from fork-originated PRs on this event, so the OAuth token is never
# exposed to untrusted forks. The review posts comments only; it is advisory and
# does NOT gate merge (the required check stays `build` from ci.yml).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least-privilege: read code, write PR review comments. id-token is required by
# anthropics/claude-code-action.
permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts; skip if the OAuth token is absent (e.g. fork PRs) so the job
    # is a clean no-op instead of a red failure.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check token presence
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not available (fork PR or secret unset) — skipping Claude review."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Claude review
        if: steps.gate.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are an advisory code reviewer on pull request
            #${{ github.event.pull_request.number }} in ${{ github.repository }},
            running before any human reviewer. Be precise and concise; do not
            rubber-stamp.

            Steps:
            1. Read AGENTS.md and CONTRIBUTING.md for the repo's rules.
            2. Read the diff: `gh pr diff ${{ github.event.pull_request.number }}`.
            3. Evaluate against these rules, highest-impact first:
               - One task (an IS-XXX from backend-specs/TASKS.md) per PR; Conventional
                 Commit title referencing it.
               - Tests added/updated for every behavioral change.
               - No new dependency outside gradle/libs.versions.toml.
               - No secrets and no generated code (jOOQ / protobuf) committed.
               - Module boundaries respected (Gradle graph + ArchUnit); no cross-module
                 reach-throughs.
               - Public REST surface stays /api/v1 (no unprompted /api/v2).
               - Correctness: likely bugs, unhandled edge cases, concurrency and
                 resource-lifecycle issues, security implications.

            Report through TWO channels:

            - INLINE COMMENTS — for every specific changed line (or small range) you
              think must be reworked, post a comment ON THAT LINE with
              mcp__github_inline_comment__create_inline_comment. State what to change
              and why. Prefix blocking items with "[blocking]" and minor ones with
              "[nit]". Only comment on lines that are part of this PR's diff.

            - VERDICT — post exactly ONE top-level PR comment with `gh pr comment`,
              and keep it short (the detail lives in the inline comments):
                * If nothing blocks merge, the comment is:
                    ## Claude review: ✅ Mergeable
                    No blocking issues.<note nit count if any>
                * If anything blocks merge, the comment is:
                    ## Claude review: ❌ Changes requested
                    <one bullet per blocking reason, each citing the file:line you
                     commented on inline>

            This review is advisory: do NOT submit a formal GitHub approval or
            request-changes review (a human does that); the required merge check
            stays `build`. You cannot run `./gradlew build` here — trust CI's `build`
            job for compile/test status. Do not comment on files outside the diff;
            no praise-only comments.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Read,Grep,Glob"
