version: 2
updates:
  - package-ecosystem: gradle # reads gradle/libs.versions.toml + build scripts
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["type:chore"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["type:chore"]
