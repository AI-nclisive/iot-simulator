name: Backend task
description: A backend implementation task (tracks an IS-ID from backend-specs/TASKS.md)
title: "[IS-XXX] "
labels: ["type:task"]
body:
  - type: input
    id: be-id
    attributes:
      label: Task ID
      description: IS-ID from backend-specs/TASKS.md, or "new" if not yet cataloged.
      placeholder: IS-039
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - build
        - persistence
        - model
        - ipc
        - runtime
        - project
        - source
        - schema
        - recording
        - replay
        - gen
        - observability
        - api
        - auth
        - io
        - sdlc
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority / wave
      options:
        - "P0 (Wave A/B/C)"
        - "P1 (Wave D/E)"
        - "P2 (Wave F)"
        - "SDLC"
        - "n/a"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this task delivers and why.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Definition of done — behavior, tests, `./gradlew build` green.
    validations:
      required: true
  - type: input
    id: depends
    attributes:
      label: Depends on
      description: IS-IDs that must land first (if any).
      placeholder: IS-035
  - type: textarea
    id: notes
    attributes:
      label: Notes
