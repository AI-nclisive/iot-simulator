name: Task
description: A backend/SDLC IS task or frontend UI task tracked in the repo catalogs
title: "IS-XXX or UI-XXX "
labels: ["type:task"]
body:
  - type: markdown
    attributes:
      value: |
        Title: **`IS-XXX short name`** for backend/SDLC tasks or
        **`UI-XXX short name`** for frontend tasks. The area is captured by the
        **Area** field below.
  - type: input
    id: task-id
    attributes:
      label: Task ID
      description: IS-ID from backend-specs/TASKS.md, UI-ID from frontend/docs/UI_TASKS.md, or "new" if not yet cataloged.
      placeholder: UI-022
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: "Project area: BE (backend), FE (frontend) or SDLC (repo/process)."
      options:
        - BE
        - FE
        - SDLC
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Subsystem this task belongs to (mainly for backend tasks; optional).
      options:
        - build
        - persistence
        - model
        - ipc
        - runtime
        - project
        - source
        - schema
        - recording
        - replay
        - gen
        - observability
        - api
        - auth
        - io
        - sdlc
  - type: dropdown
    id: priority
    attributes:
      label: Priority / wave
      options:
        - "P0 (Wave A/B/C)"
        - "P1 (Wave D/E)"
        - "P2 (Wave F)"
        - "SDLC"
        - "n/a"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this task delivers and why.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Definition of done — behavior, tests, required backend/frontend checks green.
    validations:
      required: true
  - type: input
    id: depends
    attributes:
      label: Depends on
      description: Task IDs that must land first (if any).
      placeholder: UI-001
  - type: textarea
    id: notes
    attributes:
      label: Notes
