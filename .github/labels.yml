# Source of truth for repo labels. Created via `gh label create ... --force`
# (see commands in the SDLC-8 commit / CONTRIBUTING). Area is captured by the
# issue form's Area field, so areas are not labels.
- name: "type:task"
  color: "1d76db"
  description: "Implementation task (BE-ID)"
- name: "type:bug"
  color: "d73a4a"
  description: "Something broken"
- name: "type:chore"
  color: "cfd3d7"
  description: "Tooling / maintenance"
- name: "type:docs"
  color: "0075ca"
  description: "Docs / specs"
- name: "priority:P0"
  color: "b60205"
  description: "Must-have (core runtime fidelity)"
- name: "priority:P1"
  color: "d93f0b"
  description: "Important (breadth / shared usage)"
- name: "priority:P2"
  color: "fbca04"
  description: "Advanced / hardening"
- name: "blocked"
  color: "000000"
  description: "Waiting on a dependency"
- name: "good-first-task"
  color: "0e8a16"
  description: "Good entry point for new contributors"
