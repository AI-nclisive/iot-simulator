syntax = "proto3";

package iotsim.worker.v1;

option java_multiple_files = true;
option java_package = "com.ainclusive.iotsim.workercontract.v1";
option java_outer_classname = "ProtocolDataSourceProto";

// Supervisor⇄worker contract. Loopback-only, versioned. Adding a protocol means
// adding a worker that implements this service — never changing the supervisor.
// See backend-specs/02_WORKER_CONTRACT_AND_IPC.md.
service ProtocolDataSource {
  rpc Hello (HelloRequest) returns (HelloResponse);
  rpc Configure (ConfigureRequest) returns (Ack);
  rpc Start (StartRequest) returns (Ack);
  rpc Stop (StopRequest) returns (Ack);

  // Real-source discovery (create-from-scan). The worker acts as a protocol
  // CLIENT against a real endpoint: TestConnection probes reachability/auth;
  // Scan browses the address space into neutral schema nodes. Stateless, one-shot
  // — no Configure/Start needed. See backend-specs/05_API_CONTRACT.md §Scan.
  rpc TestConnection (TestConnectionRequest) returns (TestConnectionResponse);
  // Streams ScanProgress updates as the browse descends, followed by the
  // discovered nodes in NodeBatch chunks (bounded per-message so a huge address
  // space never exceeds gRPC's max message size), ending with exactly one
  // ScanEvent carrying the terminal ScanResponse (status/counts only — no
  // nodes). See backend-specs/05 §Scan.
  rpc Scan (ScanRequest) returns (stream ScanEvent);

  // Live capture (record real data). Like Scan, the worker acts as a protocol
  // CLIENT against a real endpoint — but instead of one-shot browsing it
  // subscribes to the schema's variable nodes and streams every observed value
  // change back as neutral ValueBatches until the supervisor cancels the call.
  // Stateless/client mode — no Configure/Start needed. The recording-in path,
  // kept distinct from the conflated live-out path. See backend-specs/02 §6.
  rpc Capture (CaptureRequest) returns (stream ValueBatch);

  // Supervisor pushes neutral value batches for the worker to project onto its
  // native protocol address space (replay / synthetic / live).
  rpc ApplyValues (stream ValueBatch) returns (Ack);

  // Worker -> supervisor streams.
  rpc ClientEvents (StreamRequest) returns (stream ClientEvent);
  rpc RuntimeEvents (StreamRequest) returns (stream RuntimeEvent);

  rpc InjectFault (InjectFaultRequest) returns (Ack);
  rpc Health (HealthRequest) returns (HealthResponse);
  rpc Shutdown (ShutdownRequest) returns (Ack);
}

message Ack {
  bool ok = 1;
  string message = 2;
}

message HelloRequest {
  string contract_version = 1; // semver; mismatched major is refused
}

message HelloResponse {
  string contract_version = 1;
  string protocol = 2;                 // e.g. "OPC_UA", "MODBUS_TCP"
  repeated string capabilities = 3;    // supported data types, fault kinds, ...
}

message ConfigureRequest {
  Schema schema = 1;         // protocol-neutral schema the worker projects
  int32 listen_port = 2;     // protocol port the Edge Device connects to (0 = ephemeral)
  map<string, string> options = 3;
  SecurityConfig security_config = 4;  // endpoint auth; absent/empty = None + Anonymous (IS-131)
}

// Simulated OPC UA endpoint security (IS-131). Empty message = the historical
// None/Anonymous server. Passwords arrive pre-hashed (never plaintext on the wire).
message SecurityConfig {
  bool anonymous_allowed = 1;
  bool username_enabled = 2;
  repeated UserCredential users = 3;
  // message security (SecurityPolicy/MessageSecurityMode) added in IS-132
}

message UserCredential {
  string username = 1;
  string password_hash = 2;  // salted PBKDF2 hash; the worker verifies against it
}

message Schema {
  int32 version = 1;
  repeated SchemaNodeMsg nodes = 2;
}

message SchemaNodeMsg {
  string node_id = 1;
  string parent_id = 2;   // empty if root
  string path = 3;
  string name = 4;
  string kind = 5;        // FOLDER | VARIABLE
  string data_type = 6;   // empty if unset
  string value_rank = 7;  // empty if unset
  string access = 8;      // empty if unset
  string unit = 9;
  string description = 10;
}

message StartRequest {}
message StopRequest {}
message StreamRequest {}
message HealthRequest {}
message ShutdownRequest {}

// ---- Scan / real-source discovery ----

// Connection secrets for reaching a real source. Session-only: the secret is held
// in memory for the scan and is never persisted, exported, or logged
// (backend-specs/08_AUTH_AND_MODES.md).
message ConnectionConfigMsg {
  string mode = 1;        // ANONYMOUS | PASSWORD | EXTERNAL_REF
  string username = 2;
  string secret = 3;      // present only for PASSWORD
  string secret_ref = 4;  // present only for EXTERNAL_REF (the reference is not itself a secret)
}

message TestConnectionRequest {
  string endpoint_url = 1;            // e.g. opc.tcp://host:4840/path
  ConnectionConfigMsg credentials = 2;
}

message TestConnectionResponse {
  string status = 1;  // OK | UNREACHABLE | AUTH_FAILURE
  string message = 2;
}

message ScanRequest {
  string endpoint_url = 1;
  ConnectionConfigMsg credentials = 2;
  int32 max_nodes = 3;  // cap on discovered nodes; 0 = worker default
}

message ScanResponse {
  reserved 2;
  reserved "nodes";               // discovered nodes now delivered via NodeBatch events, not here
  string status = 1;                  // OK | PARTIAL | UNREACHABLE | AUTH_FAILURE
  bool truncated = 3;                 // hit max_nodes (large schema) -> PARTIAL
  int32 discovered_count = 4;
  int32 unknown_count = 5;            // VARIABLE nodes whose type could not be mapped
  string message = 6;
}

// A bounded chunk of discovered nodes. Kept well under gRPC's max message size
// regardless of total address-space size, so a huge server can't blow the 4MB
// default frame limit the way one giant ScanResponse.nodes list used to.
message NodeBatch {
  repeated SchemaNodeMsg nodes = 1;
}

// One update on the Scan stream: an in-flight progress tick, a chunk of
// discovered nodes, or the (exactly-one, terminal) scan result (status/counts
// only — nodes arrive exclusively via node_batch events beforehand).
message ScanEvent {
  oneof event {
    ScanProgress progress = 1;
    ScanResponse result = 2;
    NodeBatch node_batch = 3;
  }
}

message ScanProgress {
  string phase = 1;              // CONNECTING | CONNECTED | SCANNING
  int32 discovered_so_far = 2;   // running node count while phase == SCANNING
}

// ---- Live capture / record real data ----

message CaptureRequest {
  string endpoint_url = 1;            // the real source to record from
  ConnectionConfigMsg credentials = 2;
  // The data-source schema: its VARIABLE nodes are subscribed to, and each node's
  // data_type tells the worker how to encode observed values into neutral
  // value_enc bytes (so the supervisor can decode them without re-reading types).
  Schema schema = 3;
}

// ---- Values ----

enum Quality {
  QUALITY_UNSPECIFIED = 0;
  GOOD = 1;
  UNCERTAIN = 2;
  BAD = 3;
}

message Value {
  string node_id = 1;
  int64 source_time_micros = 2; // epoch micros, UTC
  bytes value_enc = 3;          // encoded per the node's data type
  Quality quality = 4;
  string quality_reason = 5;
}

message ValueBatch {
  repeated Value values = 1;
}

// ---- Events ----

message ClientEvent {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    CONNECTED = 1;
    DISCONNECTED = 2;
    SUBSCRIPTION = 3;
  }
  Kind kind = 1;
  string client_id = 2;
  int64 at_micros = 3;
}

message RuntimeEvent {
  string type = 1; // SOURCE_START, SOURCE_STOP, ERROR, FAULT_STATE_CHANGE, ...
  int64 at_micros = 2;
  string detail = 3;
}

// ---- Faults ----

message InjectFaultRequest {
  string kind = 1;   // BAD_VALUE, DELAY, CONNECTION_DROP, TIMEOUT, ...
  string layer = 2;  // NEUTRAL | PROTOCOL
  bool active = 3;   // true = activate, false = clear
  map<string, string> params = 4;
}

// ---- Health ----

message HealthResponse {
  bool live = 1;
  bool ready = 2;
  int64 rss_bytes = 3;
  string state = 4; // SPAWNED, READY, CONFIGURED, RUNNING, STOPPED
}
