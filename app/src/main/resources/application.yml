spring:
  application:
    name: iot-simulator
  # DB connection is externally configured (env-based DataSource) so one build
  # targets containerized Postgres or a managed instance. Defaults match
  # docker-compose.yml. See backend-specs/08_AUTH_AND_MODES.md.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iotsim}
    username: ${DB_USER:iotsim}
    password: ${DB_PASSWORD:iotsim}
  flyway:
    enabled: true
    locations: classpath:db/migration
  # In shared mode the backend validates bearer JWTs via JWKS (IS-075).
  # Set the issuer URI so Spring Boot auto-configures JWKS discovery.
  # Leave unset in local mode — the local security chain does not use it.
  #
  # Example (Keycloak):
  #   security:
  #     oauth2:
  #       resourceserver:
  #         jwt:
  #           issuer-uri: https://idp.example/realms/iotsim
  #
  # If OIDC discovery is unavailable (e.g. Cognito in some regions), set
  # iotsim.oidc.jwks-uri directly instead of (or in addition to) issuer-uri.

# Deployment mode: local (auth optional) | shared (OAuth2/OIDC). D2/D6.
# See backend-specs/08_AUTH_AND_MODES.md and IS-075/IS-078.
iotsim:
  mode: ${IOTSIM_MODE:local}

  # OIDC resource-server settings (shared mode only; IS-075).
  # All fields are optional — omit in local mode. When mode=shared, at least
  # one of issuer-uri or jwks-uri (or the spring.security.oauth2.* equivalent)
  # must be set so bearer JWTs can be validated.
  #
  # oidc:
  #   issuer-uri: ${OIDC_ISSUER_URI:}      # e.g. https://idp.example/realms/iotsim
  #   jwks-uri:   ${OIDC_JWKS_URI:}        # override auto-discovery; use when
  #                                         # OIDC discovery is unavailable
  #   audience:   ${OIDC_AUDIENCE:}        # required aud claim; leave blank to skip
  #   roles-claim: ${OIDC_ROLES_CLAIM:roles} # JWT claim holding role list
  #                                           # (use "groups" for some IdPs)

  # Runtime controller: memory (default, no workers) | supervisor (real
  # out-of-process protocol workers). In supervisor mode, `workers` maps each
  # protocol to the base launch command (installDist bin script); the supervisor
  # appends the loopback control port. See backend-specs/02_WORKER_CONTRACT_AND_IPC.md.
  runtime:
    mode: ${IOTSIM_RUNTIME_MODE:memory}
    # workers:
    #   OPC_UA:
    #     - /opt/iotsim/workers/worker-opcua/bin/worker-opcua
    # Restart-with-backoff on unexpected worker exit (supervisor mode). Intentional
    # stops and faults are never restarted. Unset fields use built-in defaults
    # (500ms initial, x2, 30s cap, 5 attempts). See 02_WORKER_CONTRACT_AND_IPC.md §4.
    # restart:
    #   initial-backoff: 500ms
    #   multiplier: 2.0
    #   max-backoff: 30s
    #   max-restarts: 5
  # Object storage for large artifacts (evidence exports, prepared-data imports).
  # Filesystem adapter is the local default; no blobs live in Postgres. The
  # S3-compatible adapter for shared mode lands later. See backend-specs/08_AUTH_AND_MODES.md.
  storage:
    filesystem:
      base-dir: ${IOTSIM_STORAGE_DIR:data/objects}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Version-neutral docs endpoints (springdoc's "/v3/api-docs" default refers to the
# OpenAPI spec format, not our API version). The API version lives in the
# document's info.version (v1), not in these tooling paths.
springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /swagger-ui.html
